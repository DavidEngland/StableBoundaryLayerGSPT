schema_version: 0.1.0
component: fast_slow
summary: Contract for the regularized fast-slow TKE-SBL dynamical core.

inputs:
  - name: S
    type: float
    units: s^-1
    constraints:
      min: 0.0
  - name: Gamma
    type: float
    units: K m^-1
    constraints:
      min: 0.0
  - name: e
    type: float
    units: m^2 s^-2
    constraints:
      min_exclusive: 0.0
  - name: epsilon
    type: float
    units: 1
    constraints:
      min_exclusive: 0.0
      max: 1.0

outputs:
  - name: e_dot
    type: float
    units: m^2 s^-3
  - name: S_dot
    type: float
    units: s^-2
  - name: Ts_dot
    type: float
    units: K s^-1
  - name: Gamma_dot
    type: float
    units: K m^-1 s^-1

properties:
  deterministic: true
  smooth: true
  differentiable_order: C1

validation_tiers:
  - L0
  - L1
  - L2

provenance_required:
  - dataset
  - parameter_source
  - script
  - julia_version
  - git_commit
